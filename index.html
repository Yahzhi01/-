<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中级汉语写作提升平台</title>
<style>
body{margin:0;font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei";background:#F7F9FC;color:#1F2D3D}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;border-radius:12px;padding:18px;margin-top:18px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
h1{margin-bottom:6px}
.small{color:#6B7C93;font-size:14px}
textarea{width:100%;min-height:120px;margin-top:10px;padding:10px;border-radius:8px;border:1px solid #D9E2EC}
button{background:#2F80ED;color:#fff;border:none;padding:10px 14px;border-radius:8px;margin-top:10px;cursor:pointer}
.example{background:#F2F4F8;padding:8px;border-radius:6px;margin-top:6px}
.good{color:#27AE60}
.warn{color:#E67E22}
</style>
</head>

<body>
<div class="container">
<h1>中级汉语写作提升平台</h1>
<div class="small">HSK4–5 写作训练 · 教学闭环版</div>

<div class="card">
<h3>① 写作支架</h3>
<b>篇章结构模板：</b>
<div class="example">背景介绍 → 原因分析 → 总结建议（三段式）</div>

<b>功能表达支架：</b>
<div class="example">
• 描述现象：近年来，越来越多的人开始关注……<br>
• 表达观点：我认为，这种做法具有重要意义。<br>
• 原因分析：主要原因有以下几个方面。<br>
• 总结归纳：总的来说，我们需要更加重视。
</div>
</div>

<div class="card">
<h3>② 第一次写作</h3>
<textarea id="draft1" placeholder="请根据上方支架完成你的作文初稿…"></textarea>
<button onclick="giveFeedback()">获取修改建议</button>
</div>

<div class="card">
<h3>③ 精准修改指导</h3>
<div id="fb" class="example" style="display:none"></div>
</div>

<div class="card">
<h3>④ 修改后再写</h3>
<textarea placeholder="根据修改建议，重新完成你的作文…"></textarea>
<div class="small">✨ 对比两次写作，你会看到明显进步。</div>
</div>

</div>

<script>
function giveFeedback(){
 let box=document.getElementById('fb');
 box.style.display='block';
 box.innerHTML=
 "<b>修改建议：</b><br><br>"+
 "<span class='good'>👍 优点：</span>你已经把事情经过写清楚了，很棒！<br><br>"+
 "<span class='warn'>语序调整：</span><br>"+
 "原句：我昨天在图书馆书看了<br>"+
 "修改：我昨天在图书馆看了书<br>"+
 "说明：汉语里，动词后面要接宾语。<br><br>"+
 "<span class='warn'>词汇优化：</span><br>"+
 "原句：提高兴趣<br>"+
 "修改：培养兴趣<br>"+
 "说明：“兴趣”通常和“培养”搭配，更自然。<br><br>"+
 "<span class='warn'>语法修正：</span><br>"+
 "原句：因为下雨，所以但是我没去<br>"+
 "修改：因为下雨，所以我没去<br>"+
 "说明：“因为…所以…”不能再加“但是”。<br><br>"+
 "🌟 小建议：如果在第二段开头加“首先”，文章会更有条理。";
}
</script>

</body>
</html>
