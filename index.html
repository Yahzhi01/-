<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中级汉语写作提升平台</title>
<style>
body{margin:0;font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#F5F7FA;color:#1F2D3D}
.container{max-width:960px;margin:auto;padding:20px}
h1{margin-bottom:6px}
.subtitle{color:#6B7C93}
.card{background:#fff;border-radius:12px;padding:18px;margin-top:18px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.step{display:inline-block;background:#E8F1FD;color:#2F80ED;padding:6px 10px;border-radius:20px;margin:4px 6px 0 0;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.example{background:#F2F4F8;padding:8px;border-radius:6px;margin-top:6px}
.highlight{background:#FFF3B0;padding:2px 4px;border-radius:4px}
textarea{width:100%;min-height:110px;margin-top:10px;padding:10px;border-radius:8px;border:1px solid #D9E2EC}
button{background:#2F80ED;color:#fff;border:none;padding:10px 14px;border-radius:8px;margin-top:10px;cursor:pointer}
.small{font-size:14px;color:#6B7C93}
</style>
</head>

<body>
<div class="container">
  <h1>中级汉语写作提升平台</h1>
  <div class="subtitle">HSK4–5 写作训练工具</div>

  <div class="card">
    <h3>学习路径</h3>
    <span class="step">① 学表达</span>
    <span class="step">② 学结构</span>
    <span class="step">③ 做训练</span>
    <span class="step">④ 得反馈</span>
  </div>

  <div class="card">
    <h3>功能表达工具库</h3>
    <div class="grid">
      <div>
        <b>描述现象</b>
        <div class="example">近年来，<span class="highlight">越来越多</span>的人开始…</div>
      </div>
      <div>
        <b>表达观点</b>
        <div class="example">我认为，这种做法<span class="highlight">具有重要意义</span>。</div>
      </div>
      <div>
        <b>原因分析</b>
        <div class="example">主要原因有<span class="highlight">以下几个方面</span>。</div>
      </div>
      <div>
        <b>比较对比</b>
        <div class="example">与过去相比，现在<span class="highlight">更加…</span></div>
      </div>
      <div>
        <b>总结归纳</b>
        <div class="example"><span class="highlight">总的来说</span>，我们需要…</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>篇章结构模板</h3>
    <div class="small">万能三段式</div>
    <div class="example">
      第一段：背景 + 现象<br>
      第二段：原因 / 分析<br>
      第三段：总结 + 建议
    </div>
  </div>

  <div class="card">
    <h3>引导式写作训练</h3>
    <div class="small">题目：我最难忘的一次经历</div>
    <textarea id="outline" placeholder="Step1 写提纲：发生了什么？为什么难忘？"></textarea>
    <textarea id="para" placeholder="Step2 扩写成段落"></textarea>
    <textarea id="essay" placeholder="Step3 完整作文"></textarea>
    <button onclick="feedback()">获取反馈</button>
    <div id="fb" class="example" style="display:none;margin-top:10px"></div>
  </div>
</div>

<script>
function feedback(){
  const box=document.getElementById('fb');
  box.style.display='block';
  box.innerHTML=
  "反馈建议：<br>"+
  "• 建议增加连接词提升逻辑<br>"+
  "• 可加入“总的来说”等总结表达<br>"+
  "• 注意长句断句";
}
</script>

</body>
</html>
